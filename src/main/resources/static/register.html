<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>账户注册</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    :root {
      --primary-color: #1a6fbf;
      --secondary-color: #2a9d8f;
      --light-bg: #f8f9fa;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --bg-gradient: linear-gradient(135deg, #e6f7ff 0%, #f0f7ff 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: #333;
    }

    .el-header {
      background: linear-gradient(135deg, var(--primary-color), #0d5494);
      color: white;
      line-height: 60px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 100;
      text-align: center;
    }

    .el-main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .el-footer {
      background-color: #2c3e50;
      color: #ecf0f1;
      line-height: 60px;
      text-align: center;
      font-size: 14px;
    }

    .register-form {
      width: 380px;
      background: white;
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      padding: 40px 30px;
      position: relative;
      overflow: hidden;
    }

    .register-form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    }

    .form-title {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary-color);
      font-size: 24px;
      font-weight: 500;
    }

    .el-form-item {
      margin-bottom: 20px;
    }

    .el-form-item__label {
      color: #555;
      font-weight: 500;
    }

    .el-input__inner {
      border-radius: 6px;
      padding: 10px 15px;
      height: 42px;
      border-color: #ddd;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .el-input__inner:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(26, 111, 191, 0.1);
    }

    .el-select .el-input__inner {
      padding-right: 30px;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }

    .el-button {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .el-button--primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }

    .el-button--primary:hover {
      background-color: #0d5494;
      border-color: #0d5494;
    }

    .el-button--default {
      background-color: #f8f9fa;
      border-color: #ddd;
      color: #555;
    }

    .el-button--default:hover {
      background-color: #e9ecef;
      border-color: #ddd;
      color: #333;
    }
  </style>
</head>
<body>
<div id="register-container">
  <el-container>
    <el-header>账户注册</el-header>
    <el-main>
      <el-form class="register-form" :model="form" ref="registerForm" label-width="80px">
        <h3 class="form-title">创建新账户</h3>
        <el-form-item label="真实姓名">
          <el-input v-model="form.realname"></el-input>
        </el-form-item>
        <el-form-item label="用户名">
          <el-input v-model="form.username"></el-input>
        </el-form-item>
        <el-form-item label="密码">
          <el-input type="password" v-model="form.pwd"></el-input>
        </el-form-item>
        <el-form-item label="确认密码">
          <el-input type="password" v-model="form.confirmPwd"></el-input>
        </el-form-item>
        <el-form-item label="手机号">
          <el-input v-model="form.phonenumber"></el-input>
        </el-form-item>
        <el-form-item label="用户类型">
          <el-select v-model="form.utype" placeholder="请选择用户类型">
            <el-option label="管理员" value="ROLE_1"></el-option>
            <el-option label="医师" value="ROLE_2"></el-option>
          </el-select>
        </el-form-item>
        <div class="form-actions">
          <el-button type="primary" @click="register">注册</el-button>
          <el-button @click="goBack">返回登录</el-button>
        </div>
      </el-form>
    </el-main>
    <el-footer>慧医数字医疗应用系统 - 版权所有 © 2025</el-footer>
  </el-container>
</div>

<script src="js/vue.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="js/axios.min.js"></script>

<script>
  new Vue({
    el: '#register-container',
    data() {
      return {
        form: {
          realname: '',
          username: '',
          pwd: '',
          confirmPwd: '',
          phonenumber: '',
          utype: ''
        }
      };
    },
    methods: {
      register() {
        if (!this.form.realname || !this.form.username || !this.form.pwd || !this.form.confirmPwd || !this.form.phonenumber || !this.form.utype) {
          alert('请填写所有必填项！');
          return;
        }
        if (this.form.pwd !== this.form.confirmPwd) {
          alert('两次输入的密码不一致，请重新输入！');
          return;
        }

        // 准备注册数据，不需要包含时间字段，由后端自动生成
        const registerData = {
          realname: this.form.realname,
          username: this.form.username,
          pwd: this.form.pwd,
          phonenumber: this.form.phonenumber,
          utype: this.form.utype
        };

        axios
                .post('/accounts/register', registerData)
                .then((response) => {
                  if (response.data.success) {
                    alert('注册成功，请返回登录！');
                    window.location.href = 'account.html';
                  } else {
                    alert(response.data.message);
                  }
                })
                .catch((err) => {
                  console.log(err);
                  alert('注册出错，请稍后重试！');
                });
      },
      goBack() {
        window.location.href = 'account.html';
      }
    }
  });
</script>
</body>
</html>
