<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 智慧医疗系统</title>
    <!-- 引入Vue和Element UI -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        :root {
            --primary-color: #1a6fbf;
            --secondary-color: #2a9d8f;
            --light-bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --bg-gradient: linear-gradient(135deg, #e6f7ff 0%, #f0f7ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #333;
        }

        .el-header {
            background: linear-gradient(135deg, var(--primary-color), #0d5494);
            color: white;
            line-height: 60px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-title {
            flex-grow: 1;
            text-align: center;
        }

        .el-container {
            height: 100vh;
        }

        .el-main {
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .profile-title {
            font-size: 24px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .edit-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .edit-btn:hover {
            background-color: #21897a;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .info-item {
            display: flex;
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 6px;
            background-color: rgba(26, 111, 191, 0.03);
        }

        .info-label {
            width: 100px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .info-value {
            flex: 1;
            color: #333;
        }

        .edit-form {
            margin-top: 20px;
        }

        .edit-form .el-form-item {
            margin-bottom: 15px;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
            min-width: 120px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .register-btn {
            background: var(--secondary-color);
            color: white;
        }

        .register-btn:hover {
            background: #21897a;
        }

        .home-btn {
            background: #3498db;
            color: white;
        }

        .home-btn:hover {
            background: #2980b9;
        }

        .save-btn {
            background: var(--primary-color);
            color: white;
        }

        .save-btn:hover {
            background: #0d5494;
        }

        .cancel-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            color: #555;
        }

        .cancel-btn:hover {
            background: #e9ecef;
        }

        @media (max-width: 768px) {
            .el-header {
                font-size: 16px;
                padding: 0 10px;
            }

            .profile-container {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <el-container>
        <el-header>
            <div class="header-title">慧医数字医疗应用系统 - 个人信息</div>
        </el-header>
        <el-main>
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-title">个人信息</div>
                    <button class="edit-btn" @click="toggleEditMode" v-if="!isEditing">
                        <i class="el-icon-edit"></i> 修改信息
                    </button>
                </div>

                <!-- 查看模式 -->
                <div class="user-info" v-if="!isEditing">
                    <div>
                        <div class="info-item">
                            <div class="info-label">真实姓名：</div>
                            <div class="info-value">{{ userInfo.realname || '未填写' }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">用户名：</div>
                            <div class="info-value">{{ userInfo.username }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">手机号：</div>
                            <div class="info-value">{{ userInfo.phonenumber || '未填写' }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">用户类型：</div>
                            <div class="info-value">{{ userType }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">创建时间：</div>
                            <div class="info-value">{{ formatDate(userInfo.createTime) || '未填写' }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">更新时间：</div>
                            <div class="info-value">{{ formatDate(userInfo.updateTime) || '未填写' }}</div>
                        </div>
                    </div>
                </div>

                <!-- 编辑模式 -->
                <div class="edit-form" v-else>
                    <el-form :model="editForm" ref="editFormRef" label-width="120px">
                        <el-form-item label="真实姓名" prop="realname">
                            <el-input v-model="editForm.realname"></el-input>
                        </el-form-item>
                        <el-form-item label="用户名" prop="username">
                            <el-input v-model="editForm.username"></el-input>
                        </el-form-item>
                        <el-form-item label="原密码" prop="oldPassword">
                            <el-input type="password" v-model="editForm.oldPassword"></el-input>
                        </el-form-item>
                        <el-form-item label="新密码" prop="newPassword">
                            <el-input type="password" v-model="editForm.newPassword"></el-input>
                        </el-form-item>
                        <el-form-item label="确认新密码" prop="confirmPassword">
                            <el-input type="password" v-model="editForm.confirmPassword"></el-input>
                        </el-form-item>
                        <el-form-item label="手机号" prop="phonenumber">
                            <el-input v-model="editForm.phonenumber"></el-input>
                        </el-form-item>
                        <el-form-item label="用户类型">
                            <el-input disabled v-model="userType"></el-input>
                        </el-form-item>
                    </el-form>
                </div>

                <div class="actions">
                    <button class="action-btn logout-btn" @click="logout">退出登录</button>
                    <button class="action-btn register-btn" @click="goToRegister">注册新账号</button>
                    <button class="action-btn home-btn" @click="goToHome">返回首页</button>
                    <button class="action-btn save-btn" @click="saveChanges" v-if="isEditing">保存修改</button>
                    <button class="action-btn cancel-btn" @click="cancelEdit" v-if="isEditing">取消</button>
                </div>
            </div>
        </el-main>
    </el-container>
</div>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                userInfo: {},
                isEditing: false,
                editForm: {
                    id: null,
                    realname: '',
                    username: '',
                    oldPassword: '',
                    newPassword: '',
                    confirmPassword: '',
                    phonenumber: '',
                    utype: ''
                }
            };
        },
        computed: {
            userType() {
                if (!this.userInfo.utype) return '未知';
                return this.userInfo.utype === 'ROLE_1' ? '管理员' :
                    this.userInfo.utype === 'ROLE_2' ? '医师' : '其他';
            }
        },
        mounted() {
            this.loadUserInfo();
        },
        methods: {
            loadUserInfo() {
                const user = JSON.parse(sessionStorage.getItem('currentUser'));
                if (user) {
                    this.userInfo = user;
                    // 初始化编辑表单数据
                    this.editForm = {
                        id: user.id,
                        realname: user.realname,
                        username: user.username,
                        phonenumber: user.phonenumber,
                        utype: user.utype,
                        oldPassword: '',
                        newPassword: '',
                        confirmPassword: ''
                    };
                } else {
                    this.$message.warning('未登录，请先登录系统');
                    setTimeout(() => {
                        window.location.href = 'account.html';
                    }, 1500);
                }
            },
            toggleEditMode() {
                this.isEditing = true;
            },
            cancelEdit() {
                this.isEditing = false;
                // 重置编辑表单
                this.editForm = {
                    id: this.userInfo.id,
                    realname: this.userInfo.realname,
                    username: this.userInfo.username,
                    phonenumber: this.userInfo.phonenumber,
                    utype: this.userInfo.utype,
                    oldPassword: '',
                    newPassword: '',
                    confirmPassword: ''
                };
            },
            saveChanges() {
                // 验证必填字段
                if (!this.editForm.realname || !this.editForm.username || !this.editForm.phonenumber) {
                    this.$message.error('请填写所有必填字段');
                    return;
                }

                // 如果用户输入了原密码，检查新密码和确认密码
                if (this.editForm.oldPassword) {
                    if (!this.editForm.newPassword || !this.editForm.confirmPassword) {
                        this.$message.error('请输入新密码并确认');
                        return;
                    }

                    if (this.editForm.newPassword !== this.editForm.confirmPassword) {
                        this.$message.error('两次输入的新密码不一致');
                        return;
                    }

                    // 检查原密码是否正确
                    if (this.editForm.oldPassword !== this.userInfo.pwd) {
                        this.$message.error('原密码不正确');
                        return;
                    }
                }

                // 准备更新数据
                const updateData = {
                    id: this.editForm.id,
                    realname: this.editForm.realname,
                    username: this.editForm.username,
                    phonenumber: this.editForm.phonenumber,
                    utype: this.editForm.utype
                };

                // 如果用户修改了密码，更新密码
                if (this.editForm.newPassword) {
                    updateData.pwd = this.editForm.newPassword;
                }

                // 发送更新请求
                axios.post('/accounts/update', updateData)
                    .then(response => {
                        if (response.data.success) {
                            this.$message.success('更新成功');
                            // 更新本地存储的用户信息
                            const updatedUser = {
                                ...this.userInfo,
                                realname: this.editForm.realname,
                                username: this.editForm.username,
                                phonenumber: this.editForm.phonenumber,
                                pwd: this.editForm.newPassword || this.userInfo.pwd,
                                updateTime: new Date()
                            };
                            sessionStorage.setItem('currentUser', JSON.stringify(updatedUser));
                            this.userInfo = updatedUser;
                            this.isEditing = false;
                        } else {
                            this.$message.error(response.data.message || '更新失败');
                        }
                    })
                    .catch(error => {
                        console.error('更新失败:', error);
                        this.$message.error('更新失败，请稍后重试');
                    });
            },
            logout() {
                sessionStorage.removeItem('currentUser');
                this.$message.success('已退出登录');
                setTimeout(() => {
                    window.location.href = 'account.html';
                }, 1000);
            },
            goToRegister() {
                window.location.href = 'register.html';
            },
            goToHome() {
                const user = JSON.parse(sessionStorage.getItem('currentUser'));
                if (user && user.utype === 'ROLE_1') {
                    window.location.href = 'index1.html';
                } else {
                    window.location.href = 'index.html';
                }
            },
            formatDate(timestamp) {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                return date.toLocaleString();
            }
        }
    });
</script>
</body>
</html>
